<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Baccarat System 2.0</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Baccarat">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">

<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=1AKwpHw-t_eWdoRqYUUdrvtojeJOdfl_ThID4ovDaUluY5OcfYiTMBrVTDI5Cp1sYZfi6a-HrTyxTcxafcSPw6KeeeZuKToYGeu7F2CzWRUv_GGIC0owHN5tJ4PHDfyN-TaYdrYaZwhTfU2hzHsGtkjYXwEFDU6L09kfXM5Mh0B3pPWDudlkIZZPxd9WzmelWWWunYE768xPC-JNURTyIyAJ9gev27LfxbqqW-KeEkQjOHTNi5QwfY3yx1c8bCWHsO7Lc3uF2L3HF1s8MbIWiw" charset="UTF-8"></script><style>
:root{
--bg:#000;
--border:#d8deea;
--text:#1f2937;
--muted:#6b7280;
--player-bg:#eef5ff;
--player-border:#93c5fd;
--banker-bg:#fff1f2;
--banker-border:#fda4af;
--active:#fff7cc;
--active-border:#f59e0b;
--blue:#2563eb;
--red:#dc2626;
--green:#059669;
--orange:#f97316;
--purple:#7c3aed;
--teal:#0f766e;
--soft:#eef2f7;
--soft-border:#cbd5e1;
--blue-soft:#dbeafe;
--red-soft:#fee2e2;
--green-soft:#dcfce7;
--orange-soft:#ffedd5;
--purple-soft:#ede9fe;
--teal-soft:#ccfbf1;
}

*{box-sizing:border-box}
html,body{
margin:0;
min-height:100%;
background:var(--bg);
color:var(--text);
font-family:Arial,"Microsoft JhengHei",sans-serif;
}
body{
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

.container{
max-width:920px;
margin:0 auto;
padding:12px;
}

.logo-wrap{
display:flex;
align-items:center;
justify-content:center;
margin-bottom:12px;
}
.logo{
display:flex;
align-items:center;
gap:10px;
padding:10px 14px;
border:1px solid #2a2a2a;
border-radius:16px;
background:linear-gradient(180deg,#0f172a 0%, #111827 100%);
box-shadow:0 10px 30px rgba(0,0,0,.35);
}
.logo-mark{
width:40px;
height:40px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:22px;
color:#fff;
background:linear-gradient(135deg,var(--blue),var(--red));
}
.logo-text{line-height:1.05}
.logo-title{color:#fff;font-size:20px;font-weight:900}
.logo-sub{color:#94a3b8;font-size:11px;font-weight:700;margin-top:3px;letter-spacing:1.6px}

.top-box{
display:flex;
gap:12px;
}
.side{
flex:1;
border-radius:16px;
padding:12px;
border:2px solid transparent;
}
.player-side{background:var(--player-bg);border-color:var(--player-border)}
.banker-side{background:var(--banker-bg);border-color:var(--banker-border)}
.title{
font-size:18px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}
.sub-title{
display:block;
font-size:12px;
color:var(--muted);
font-weight:600;
margin-top:3px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}
.cell{
height:62px;
border:2px solid #d6dce8;
border-radius:14px;
background:rgba(255,255,255,.92);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:700;
cursor:pointer;
user-select:none;
}
.cell.empty::after{
font-size:12px;
font-weight:600;
color:#94a3b8;
}
.cell.p1.empty::after{content:'P1'}
.cell.p2.empty::after{content:'P2'}
.cell.p3.empty::after{content:'P3'}
.cell.b1.empty::after{content:'B1'}
.cell.b2.empty::after{content:'B2'}
.cell.b3.empty::after{content:'B3'}
.span2{grid-column:1 / span 2}
.active{
background:var(--active);
border-color:var(--active-border);
box-shadow:0 0 0 3px rgba(245,158,11,.15);
}

.card{
margin-top:12px;
background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);
border:1px solid var(--border);
border-radius:18px;
padding:12px;
box-shadow:0 8px 24px rgba(15,23,42,.08);
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
}
.score-main,.control-row{
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
}
.round-wrap{
display:flex;
align-items:center;
gap:6px;
padding:6px 10px;
border:1px solid var(--soft-border);
background:#f8fafc;
border-radius:10px;
}
.label{
font-size:12px;
font-weight:700;
color:#64748b;
}
.round-input{
width:78px;
border:1px solid #cbd5e1;
border-radius:8px;
padding:6px 8px;
font-size:14px;
}

.score-badge{
min-width:92px;
padding:8px 12px;
border-radius:999px;
font-size:15px;
font-weight:700;
text-align:center;
background:#eef2ff;
}
.score-badge.player{color:var(--blue)}
.score-badge.banker{color:var(--red);background:#fff1f2}
.winner-text{font-size:24px;font-weight:800}
.winner-player{color:var(--blue)}
.winner-banker{color:var(--red)}
.winner-tie{color:var(--green)}

.btn{
border:1px solid var(--soft-border);
background:var(--soft);
color:#475569;
border-radius:10px;
padding:7px 10px;
font-size:13px;
font-weight:700;
cursor:pointer;
}
.btn-next{
background:#eff6ff;
color:#1d4ed8;
border-color:#bfdbfe;
}
.btn-history{
background:#fff1f2;
color:#b91c1c;
border-color:#fecdd3;
}

.detail-text{
margin-top:8px;
font-size:14px;
line-height:1.45;
color:#334155;
}

.buttons{
display:grid;
grid-template-columns:repeat(7,minmax(0,1fr));
gap:6px;
width:100%;
}
button.key{
border:1px solid #cfd8e3;
background:#fff;
border-radius:12px;
padding:10px 4px;
font-size:15px;
font-weight:700;
color:#111827;
cursor:pointer;
min-height:46px;
}
.skip-key{
background:#f3f4f6 !important;
color:#4b5563 !important;
}

.pro-grid{
display:grid;
grid-template-columns:1fr;
gap:8px;
margin-top:10px;
}
.line-row{
font-size:24px;
font-weight:900;
line-height:1.4;
word-break:break-word;
}
.line-sub{
font-size:13px;
color:#334155;
line-height:1.35;
word-break:break-word;
}

.s-label{color:var(--blue)}
.m-label{color:var(--red)}
.t-label{color:var(--green)}
.r-label{color:var(--orange)}
.x-label{color:var(--teal)}
.c-label{color:var(--purple)}

.stats-row{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:8px;
}
.stat-box{
border-radius:12px;
padding:8px 6px;
text-align:center;
border:1px solid #e5e7eb;
background:#fff;
position:relative;
}
.stat-name{
font-size:11px;
font-weight:800;
color:#64748b;
margin-bottom:4px;
}
.stat-rate{
font-size:15px;
font-weight:900;
line-height:1;
}
.stat-blue .stat-rate{color:var(--blue)}
.stat-red .stat-rate{color:var(--red)}
.stat-green .stat-rate{color:var(--green)}
.stat-orange .stat-rate{color:var(--orange)}
.stat-teal .stat-rate{color:var(--teal)}
.stat-purple .stat-rate{color:var(--purple)}
.rate-strong{box-shadow:0 0 0 2px rgba(245,158,11,.18);border-color:#fcd34d}
.rate-mid{box-shadow:0 0 0 2px rgba(59,130,246,.10)}
.rate-low{opacity:.78}
.best-stat{
box-shadow:0 0 0 3px rgba(245,158,11,.22), 0 8px 16px rgba(245,158,11,.12);
border-color:#f59e0b !important;
}

.history-list{
margin-top:10px;
max-height:340px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}
.history-empty{
color:var(--muted);
font-size:14px;
padding:8px 0;
}
.history-item{
border:1px solid var(--border);
border-radius:14px;
padding:10px;
background:#fff;
position:relative;
}
.history-top{
display:flex;
justify-content:space-between;
gap:8px;
align-items:flex-start;
flex-wrap:wrap;
}
.history-main{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px;
flex-wrap:wrap;
flex:1 1 auto;
min-width:0;
padding-right:100px;
}
.history-cards{
font-size:13px;
line-height:1.45;
min-width:116px;
}
.history-smr{
color:#94a3b8;
font-size:12px;
line-height:1.3;
display:flex;
gap:8px;
flex-wrap:wrap;
flex:1 1 auto;
min-width:0;
}
.history-smr>div{
padding:4px 8px;
border:1px solid #e2e8f0;
border-radius:10px;
background:#f8fafc;
white-space:nowrap;
}
.history-result{
font-size:13px;
font-weight:800;
border-radius:999px;
padding:6px 10px;
background:#f8fafc;
flex:0 0 auto;
position:absolute;
top:10px;
right:10px;
}
.hit{color:#166534;background:#dcfce7}
.miss{color:#b91c1c;background:#fee2e2}
.draw{color:#6b7280;background:#f3f4f6}
.status-hit{color:#166534;font-weight:700}
.status-miss{color:#b91c1c;font-weight:700}
.status-draw{color:#6b7280;font-weight:700}

@media (max-width:500px){
.container{padding:6px}
.logo{padding:8px 10px;border-radius:14px}
.logo-mark{width:34px;height:34px;font-size:18px;border-radius:10px}
.logo-title{font-size:16px}
.logo-sub{font-size:9px}
.top-box{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.side{padding:8px 6px;border-radius:12px}
.title{font-size:14px;margin-bottom:6px}
.sub-title{font-size:10px}
.grid{gap:6px}
.cell{height:46px;font-size:17px;border-radius:10px}
.cell.empty::after{font-size:10px}
.card{margin-top:10px;padding:10px;border-radius:14px}
.winner-text{font-size:16px}
.score-badge{min-width:64px;font-size:11px;padding:5px 7px}
.detail-text{font-size:11px}
.round-wrap{padding:4px 6px;gap:4px;border-radius:8px}
.label{font-size:11px}
.round-input{width:54px;font-size:11px;padding:4px 5px}
button.key{min-height:36px;padding:6px 2px;font-size:11px;border-radius:9px}
.btn,.btn-next,.btn-history{padding:5px 7px;font-size:11px;border-radius:8px}

.line-row{
font-size:17px;
line-height:1.35;
}
.line-sub{
font-size:10px;
line-height:1.25;
}

.stats-row{gap:3px}
.stat-box{border-radius:10px;padding:6px 3px}
.stat-name{font-size:8px}
.stat-rate{font-size:11px}

.history-list{
margin-top:8px;
max-height:280px;
gap:6px;
}
.history-item{
padding:9px;
border-radius:12px;
}
.history-top{
gap:4px;
}
.history-main{
width:100%;
gap:6px;
flex-direction:column;
align-items:stretch;
padding-right:0;
padding-top:22px;
}
.history-cards{
font-size:12px;
line-height:1.28;
min-width:0;
}

/* 這裡是唯一縮小的地方：手機版歷史三格全部同時顯示，不用滑動 */
.history-smr{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:2px;
font-size:9px;
line-height:1.08;
width:100%;
}
.history-smr>div{
min-width:0;
text-align:center;
padding:4px 2px;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
}

.history-result{
top:8px;
right:8px;
font-size:11px;
padding:5px 8px;
}
}
</style>
</head>
<body>
<div class="container">
<div class="logo-wrap">
<div class="logo">
<div class="logo-mark">B</div>
<div class="logo-text">
<div class="logo-title">Baccarat</div>
<div class="logo-sub">SYSTEM 2.0</div>
</div>
</div>
</div>

<div class="top-box">
<div class="side player-side">
<div class="title">PLAYER<span class="sub-title">閒家</span></div>
<div class="grid">
<div class="cell empty p1" data-index="0"></div>
<div class="cell empty p2" data-index="1"></div>
<div class="cell empty p3 span2" data-index="4"></div>
</div>
</div>
<div class="side banker-side">
<div class="title">BANKER<span class="sub-title">莊家</span></div>
<div class="grid">
<div class="cell empty b1" data-index="2"></div>
<div class="cell empty b2" data-index="3"></div>
<div class="cell empty b3 span2" data-index="5"></div>
</div>
</div>
</div>

<div class="card">
<div class="row">
<div class="score-main">
<div class="score-badge player" id="playerScore">閒 0</div>
<div class="score-badge banker" id="bankerScore">莊 0</div>
<div class="winner-text winner-tie" id="winnerText">和局</div>
</div>
<div class="control-row">
<div class="round-wrap">
<span class="label">局數</span>
<input class="round-input" id="roundInput" type="number" min="1" step="1">
</div>
<button class="btn btn-next" type="button" id="nextBtn">下一局</button>
<button class="btn" type="button" id="clearBoardBtn">清除本局</button>
</div>
</div>
<div class="detail-text">
<div class="label">判斷資訊</div>
<div id="detailText">請先輸入局數，再依序輸入牌面</div>
</div>
</div>

<div class="card">
<div class="label">牌面鍵</div>
<div class="buttons" id="cardButtons">
<button class="key" type="button" data-card="A">A</button>
<button class="key" type="button" data-card="2">2</button>
<button class="key" type="button" data-card="3">3</button>
<button class="key" type="button" data-card="4">4</button>
<button class="key" type="button" data-card="5">5</button>
<button class="key" type="button" data-card="6">6</button>
<button class="key" type="button" data-card="7">7</button>
<button class="key" type="button" data-card="8">8</button>
<button class="key" type="button" data-card="9">9</button>
<button class="key" type="button" data-card="10">10</button>
<button class="key" type="button" data-card="J">J</button>
<button class="key" type="button" data-card="Q">Q</button>
<button class="key" type="button" data-card="K">K</button>
<button class="key skip-key" type="button" id="skipBtn">不補</button>
</div>
</div>

<div class="card">
<div class="row">
<div>
<div class="label">專業版分析</div>
</div>
</div>
<div class="pro-grid">
<div id="linePredict" class="line-row">M:-　T:-　R:-</div>
<div id="linePredictMeta" class="line-sub">M點差:-/公牌:-｜T真數:-/建議:-｜R尾數:-/翻邊:-</div>
<div id="lineStats" class="stats-row">
<div class="stat-box stat-red"><div class="stat-name">M勝率</div><div class="stat-rate">0%</div></div>
<div class="stat-box stat-green"><div class="stat-name">T勝率</div><div class="stat-rate">0%</div></div>
<div class="stat-box stat-orange"><div class="stat-name">R勝率</div><div class="stat-rate">0%</div></div>
</div>
</div>

<div class="card">
<div class="row">
<div>
<div class="label">歷史紀錄</div>
<div style="font-size:13px;color:#475569;">最新在最上，可下拉查看</div>
</div>
<button class="btn btn-history" type="button" id="clearHistoryBtn">清除歷史</button>
</div>
<div class="history-list" id="historyList"></div>
</div>
</div>

<script>
(function () {
const STORAGE_KEY = 'baccarat_system_2_0_mtr_only_v2';

let values = ['', '', '', '', '', ''];
const order = [0, 1, 2, 3, 4, 5];
let currentStep = 0;
let selectedIndex = null;
let historyData = [];
let pendingPrediction = null;
let resolvedRounds = [];

const cells = Array.from(document.querySelectorAll('.cell'));
const roundInputEl = document.getElementById('roundInput');
const cardButtonsEl = document.getElementById('cardButtons');
const nextBtn = document.getElementById('nextBtn');
const clearBoardBtn = document.getElementById('clearBoardBtn');
const skipBtn = document.getElementById('skipBtn');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');

const playerScoreEl = document.getElementById('playerScore');
const bankerScoreEl = document.getElementById('bankerScore');
const winnerTextEl = document.getElementById('winnerText');
const detailTextEl = document.getElementById('detailText');
const linePredictEl = document.getElementById('linePredict');
const linePredictMetaEl = document.getElementById('linePredictMeta');
const lineStatsEl = document.getElementById('lineStats');
const historyListEl = document.getElementById('historyList');

function getPickValueHtml(p) {
if (p === '閒') return '<span style="color:#2563eb;font-weight:900;">閒</span>';
if (p === '莊') return '<span style="color:#dc2626;font-weight:900;">莊</span>';
if (p === '-' || p === '觀望' || p === '待輸入') {
return '<span style="color:#6b7280;font-weight:900;">' + p + '</span>';
}
return '<span style="color:#6b7280;font-weight:900;">' + p + '</span>';
}

function colorPick(name, p) {
const labelClassMap = {
M: 'm-label',
T: 't-label',
R: 'r-label'
};
const labelClass = labelClassMap[name] || '';
return '<span class="' + labelClass + '">' + name + ':</span>' + getPickValueHtml(p);
}

function getStatTierClass(rate) {
if (rate >= 60) return 'rate-strong';
if (rate >= 45) return 'rate-mid';
return 'rate-low';
}

function saveToStorage() {
localStorage.setItem(STORAGE_KEY, JSON.stringify({
values,
currentStep,
selectedIndex,
historyData,
pendingPrediction,
resolvedRounds,
roundInput: roundInputEl.value || ''
}));
}

function loadFromStorage() {
try {
const raw = localStorage.getItem(STORAGE_KEY);
if (!raw) return;
const data = JSON.parse(raw);
if (Array.isArray(data.values) && data.values.length === 6) values = data.values;
currentStep = Number.isInteger(data.currentStep) ? data.currentStep : 0;
selectedIndex = Number.isInteger(data.selectedIndex) ? data.selectedIndex : null;
historyData = Array.isArray(data.historyData) ? data.historyData : [];
pendingPrediction = data.pendingPrediction || null;
resolvedRounds = Array.isArray(data.resolvedRounds) ? data.resolvedRounds : [];
roundInputEl.value = data.roundInput || '';
} catch (e) {
console.error(e);
}
}

function getRoundNumber() {
const n = parseInt(roundInputEl.value, 10);
return Number.isFinite(n) && n > 0 ? n : null;
}

function getDecksByRound(roundNo) {
if (roundNo === null) return null;
if (roundNo <= 10) return 8;
if (roundNo <= 20) return 7;
if (roundNo <= 30) return 6;
if (roundNo <= 40) return 5;
if (roundNo <= 50) return 4;
return 3;
}

function getValue(card) {
if (!card) return 0;
if (card === 'A') return 1;
if (card === '10' || card === 'J' || card === 'Q' || card === 'K') return 0;
return parseInt(card, 10) || 0;
}

function getTrueCountWeight(card) {
if (!card) return 0;
if (['A', '2', '7', '8', '9'].includes(card)) return 1;
if (['3', '4', '5', '6'].includes(card)) return -1;
return 0;
}

function getCards(arr) {
return arr.filter(Boolean);
}

function getActualResultLabel(playerTotal, bankerTotal) {
if (playerTotal > bankerTotal) return '閒';
if (bankerTotal > playerTotal) return '莊';
return '和';
}

function getWinnerTextClass(result) {
if (result === '閒贏') return 'winner-player';
if (result === '莊贏') return 'winner-banker';
return 'winner-tie';
}

function getHistoryStatus(prediction, actual) {
if (actual === '和') return '-';
if (prediction !== '閒' && prediction !== '莊') return '-';
return prediction === actual ? '準' : '失敗';
}

function isNatural(p2, b2) {
return p2 >= 8 || b2 >= 8;
}

function shouldPlayerDraw(p2) {
return p2 <= 5;
}

function shouldBankerDraw(b2, playerThird, playerDrew) {
if (!playerDrew) return b2 <= 5;
const pt = getValue(playerThird);
if (b2 <= 2) return true;
if (b2 === 3) return pt !== 8;
if (b2 === 4) return pt >= 2 && pt <= 7;
if (b2 === 5) return pt >= 4 && pt <= 7;
if (b2 === 6) return pt === 6 || pt === 7;
return false;
}

function evaluateS(allCards) {
if (allCards.length === 0) return { pick: '待輸入', meta: '分數：-' };
let score = 0;
allCards.forEach(function (card) {
if (card === '8') score += 4;
else if (card === '9' || card === 'A') score += 3;
else if (card === '2' || card === '3') score += 2;
else if (card === '4' || card === '5') score += 1;
});
return { pick: score > 5 ? '閒' : '莊', meta: '分數：' + score };
}

function evaluateM(playerCards, bankerCards, allCards) {
if (playerCards.length < 2 || bankerCards.length < 2) {
return { pick: '待輸入', meta: '點差：-\n公牌奇偶：-' };
}
const playerTotalRaw = playerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
const bankerTotalRaw = bankerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
const diff = playerTotalRaw - bankerTotalRaw;
const sign1 = diff >= 0 ? '正' : '負';
const publicCount = allCards.filter(function (c) { return ['10', 'J', 'Q', 'K'].includes(c); }).length;
const sign2 = publicCount % 2 === 0 ? '正' : '負';
const finalSign = sign1 === sign2 ? '正' : '負';
return {
pick: finalSign === '正' ? '閒' : '莊',
meta: '點差：' + diff + '\n公牌奇偶：' + (publicCount % 2 === 0 ? '正' : '負')
};
}

function evaluateTrueCount(allCards, roundNo) {
if (allCards.length === 0) {
return { pick: '待輸入', meta: '真數：-\n建議：-' };
}
const decks = getDecksByRound(roundNo);
if (!decks) {
return { pick: '待輸入', meta: '真數：-\n建議：請輸入局數' };
}
const total = allCards.reduce(function (sum, card) {
return sum + getTrueCountWeight(card);
}, 0);
const trueCount = total / decks;
let pick = '觀望';
if (trueCount > 0) pick = '閒';
else if (trueCount < 0) pick = '莊';

const absTC = Math.abs(trueCount);
let advice = '觀望';
if (absTC > 0.6) advice = '下大注';
else if (absTC > 0.5) advice = '小下注';
else if (absTC >= 0.35 && absTC <= 0.5) advice = '看一把';
else if (absTC < 0.25) advice = '下大注';
else advice = '小下注';
if (pick === '觀望') advice = '觀望';

return {
pick: pick,
meta: '真數：' + trueCount.toFixed(2) + '\n建議：' + advice
};
}

function evaluateR(playerCards, bankerCards, allCards) {
if (playerCards.length < 2 || bankerCards.length < 2) {
return { pick: '待輸入', meta: '尾數：-\n翻邊：-', flip: false, publicOdd: false };
}
const playerRaw = playerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
const bankerRaw = bankerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
const tail = (playerRaw % 10) + (bankerRaw % 10);
const publicCount = allCards.filter(function (c) { return ['10', 'J', 'Q', 'K'].includes(c); }).length;
const publicOdd = publicCount % 2 === 1;
const flip = allCards.length === 5 || allCards.length === 6 || (allCards.length === 4 && publicCount === 0);
let pick = tail === 19 ? '閒' : '莊';
if (flip) pick = pick === '閒' ? '莊' : '閒';
return {
pick: pick,
meta: '尾數：' + tail + '\n翻邊：' + (flip ? '是' : '否'),
flip: flip,
publicOdd: publicOdd
};
}

function evaluateX(playerTotal, bankerTotal, incomingXPick) {
if (playerTotal === null || bankerTotal === null) {
return { pick: '待輸入', meta: '差值：-\n規則：-' };
}

const prevResolved = resolvedRounds[0] || null;

if (playerTotal === bankerTotal) {
if (prevResolved && prevResolved.actual === '和') {
return { pick: '-', meta: '連續和局：-' };
}
if (incomingXPick === '閒') {
return { pick: '莊', meta: '和局反看：本局原預測閒' };
}
if (incomingXPick === '莊') {
return { pick: '閒', meta: '和局反看：本局原預測莊' };
}
return { pick: '-', meta: '和局但無前預測：-' };
}

const currentHasZero = playerTotal === 0 || bankerTotal === 0;
const prevHasZero = prevResolved ? (prevResolved.playerTotal === 0 || prevResolved.bankerTotal === 0) : false;
if (currentHasZero && prevHasZero) {
return { pick: '-', meta: '0點連開兩把：-' };
}

let diff;
let pick;

if (bankerTotal > playerTotal) {
diff = bankerTotal - playerTotal;
pick = [2,3,5,8,9].includes(diff) ? '莊' : '閒';
return { pick: pick, meta: '差值：' + diff + '\n規則：莊大減閒' };
} else {
diff = playerTotal - bankerTotal;
pick = [2,4,6,8].includes(diff) ? '莊' : '閒';
return { pick: pick, meta: '差值：' + diff + '\n規則：閒大減莊' };
}
}

function evaluateC(stateBase) {
const basePicks = [stateBase.s.pick, stateBase.m.pick, stateBase.t.pick, stateBase.r.pick, stateBase.x.pick]
.filter(function (p) { return p === '閒' || p === '莊'; });

const playerCount = basePicks.filter(function (p) { return p === '閒'; }).length;
const bankerCount = basePicks.filter(function (p) { return p === '莊'; }).length;

if (playerCount === bankerCount) {
return { pick: '觀望', meta: '共振：' + playerCount + '比' + bankerCount + '\n補強：平手' };
}

const side = playerCount > bankerCount ? '閒' : '莊';
const p2 = stateBase.p2;
const b2 = stateBase.b2;
const flip = !!stateBase.r.flip;
const publicOdd = !!stateBase.r.publicOdd;

let support = 0;
let tAligned = false;

if (side === '閒') {
if (p2 >= b2) support += 1;
if (stateBase.t.pick === '閒') { support += 1; tAligned = true; }
if (!flip) support += 1;
} else {
if (b2 > p2) support += 1;
if (stateBase.t.pick === '莊') { support += 1; tAligned = true; }
if (flip || publicOdd) support += 1;
}

const pick = support >= 2 ? side : '觀望';
return {
pick: pick,
meta: '共振：' + playerCount + '比' + bankerCount + '\n補強：' + support + '/3｜真數同向：' + (tAligned ? '是' : '否')
};
}

function getRoundState() {
const playerCards = getCards([values[0], values[1], values[4]]);
const bankerCards = getCards([values[2], values[3], values[5]]);
const allCards = playerCards.concat(bankerCards);
const roundNo = getRoundNumber();

const p2 = (getValue(values[0]) + getValue(values[1])) % 10;
const b2 = (getValue(values[2]) + getValue(values[3])) % 10;
const playerThird = values[4] || null;
const bankerThird = values[5] || null;

let info = roundNo ? '請依序輸入牌面' : '請先輸入局數';
if (roundNo && values[0] && values[1] && values[2] && values[3]) {
if (isNatural(p2, b2)) {
info = '天牌（不補）';
} else {
info = '';
if (playerThird === null) info += shouldPlayerDraw(p2) ? '閒應補牌 ' : '閒不補 ';
if (bankerThird === null) {
if (playerThird === null && shouldPlayerDraw(p2)) info += '莊待閒第三張後判定';
else info += shouldBankerDraw(b2, playerThird, playerThird !== null) ? '莊應補牌' : '莊不補';
}
if (!info.trim()) info = '本局已輸入完成';
}
}

const hasEnough = playerCards.length >= 2 && bankerCards.length >= 2;
const playerTotal = hasEnough ? playerCards.reduce(function (s, c) { return s + getValue(c); }, 0) % 10 : null;
const bankerTotal = hasEnough ? bankerCards.reduce(function (s, c) { return s + getValue(c); }, 0) % 10 : null;
const actual = hasEnough ? getActualResultLabel(playerTotal, bankerTotal) : '-';

const state = {
playerCards,
bankerCards,
allCards,
playerTotal,
bankerTotal,
actual,
info,
roundNo,
p2,
b2
};

state.s = evaluateS(allCards);
state.m = evaluateM(playerCards, bankerCards, allCards);
state.t = evaluateTrueCount(allCards, roundNo);
state.r = evaluateR(playerCards, bankerCards, allCards);
state.x = evaluateX(playerTotal, bankerTotal, pendingPrediction ? pendingPrediction.xPick : null);
state.c = evaluateC(state);

return state;
}

function calcRate(key) {
const valid = historyData.filter(function (item) {
return item.actual !== '和' && item[key + 'Status'] !== '-';
});
const hit = valid.filter(function (item) {
return item[key + 'Status'] === '準';
}).length;
const total = valid.length;
return { hit, total, rate: total === 0 ? 0 : Math.round((hit / total) * 100) };
}

function formatPredictMeta(mMeta, tMeta, rMeta) {
const mParts = String(mMeta || '點差：-\n公牌奇偶：-').split('\n');
const tParts = String(tMeta || '真數：-\n建議：-').split('\n');
const rParts = String(rMeta || '尾數：-\n翻邊：-').split('\n');

return 'M點差:' + (mParts[0] || '點差：-').replace('點差：', '') +
'/公牌:' + (mParts[1] || '公牌奇偶：-').replace('公牌奇偶：', '') +
'｜T真數:' + (tParts[0] || '真數：-').replace('真數：', '') +
'/建議:' + (tParts[1] || '建議：-').replace('建議：', '') +
'｜R尾數:' + (rParts[0] || '尾數：-').replace('尾數：', '') +
'/翻邊:' + (rParts[1] || '翻邊：-').replace('翻邊：', '');
}

function renderPredict(state) {
linePredictEl.innerHTML =
colorPick('M', state.m.pick) +
'　' + colorPick('T', state.t.pick) +
'　' + colorPick('R', state.r.pick);

linePredictMetaEl.textContent = formatPredictMeta(
state.m.meta, state.t.meta, state.r.meta
);
}

function renderStats() {
const m = calcRate('m');
const t = calcRate('t');
const r = calcRate('r');

const stats = [
{ cls: 'stat-red', name: 'M勝率', rate: m.rate },
{ cls: 'stat-green', name: 'T勝率', rate: t.rate },
{ cls: 'stat-orange', name: 'R勝率', rate: r.rate }
];

const maxRate = Math.max.apply(null, stats.map(function(item){ return item.rate; }));

lineStatsEl.innerHTML = stats.map(function(item) {
const bestClass = item.rate === maxRate && maxRate > 0 ? ' best-stat' : '';
return '<div class="stat-box ' + item.cls + ' ' + getStatTierClass(item.rate) + bestClass + '">' +
'<div class="stat-name">' + item.name + '</div>' +
'<div class="stat-rate">' + item.rate + '%</div>' +
'</div>';
}).join('');
}

function calc() {
const state = getRoundState();

playerScoreEl.textContent = '閒 ' + (state.playerTotal === null ? 0 : state.playerTotal);
bankerScoreEl.textContent = '莊 ' + (state.bankerTotal === null ? 0 : state.bankerTotal);

const winnerText = state.actual === '閒' ? '閒贏' : state.actual === '莊' ? '莊贏' : '和局';
winnerTextEl.textContent = winnerText;
winnerTextEl.className = 'winner-text ' + getWinnerTextClass(winnerText);

detailTextEl.textContent = state.info;
renderPredict(state);
renderStats();
}

function highlight() {
cells.forEach(function (c) { c.classList.remove('active'); });
if (selectedIndex !== null) {
const target = document.querySelector("[data-index='" + selectedIndex + "']");
if (target) target.classList.add('active');
}
}

function renderHistory() {
const currentState = getRoundState();
const liveItems = [];

if (pendingPrediction) {
const hasAnyCurrentCard = currentState.playerCards.length > 0 || currentState.bankerCards.length > 0;
const liveActual = currentState.playerCards.length >= 2 && currentState.bankerCards.length >= 2
? currentState.actual
: '-';

const liveMStatus = liveActual === '-' ? '-' : getHistoryStatus(pendingPrediction.mPick, liveActual);
const liveTStatus = liveActual === '-' ? '-' : getHistoryStatus(pendingPrediction.tPick, liveActual);
const liveRStatus = liveActual === '-' ? '-' : getHistoryStatus(pendingPrediction.rPick, liveActual);

if (hasAnyCurrentCard) {
liveItems.push({
sourceRound: pendingPrediction.sourceRound,
targetRound: pendingPrediction.targetRound,
player: currentState.playerCards.join(' '),
banker: currentState.bankerCards.join(' '),
actual: liveActual,
mPick: pendingPrediction.mPick,
tPick: pendingPrediction.tPick,
rPick: pendingPrediction.rPick,
mStatus: liveMStatus,
tStatus: liveTStatus,
rStatus: liveRStatus,
isLive: true
});
}
}

const allItems = liveItems.concat(historyData);

if (allItems.length === 0) {
historyListEl.innerHTML = '<div class="history-empty">目前還沒有歷史紀錄</div>';
return;
}

historyListEl.innerHTML = allItems.map(function (item) {
const mCls = item.mStatus === '準' ? 'status-hit' : item.mStatus === '失敗' ? 'status-miss' : 'status-draw';
const tCls = item.tStatus === '準' ? 'status-hit' : item.tStatus === '失敗' ? 'status-miss' : 'status-draw';
const rCls = item.rStatus === '準' ? 'status-hit' : item.rStatus === '失敗' ? 'status-miss' : 'status-draw';

const actualClass = item.actual === '和' ? 'draw' : item.actual === '閒' ? 'hit' : item.actual === '莊' ? 'miss' : '';
const roundText = item.sourceRound && item.targetRound
? '<div style="font-size:12px;color:#64748b;margin-bottom:4px;">第' + item.sourceRound + '局預測第' + item.targetRound + '局' + (item.isLive ? '（進行中）' : '') + '</div>'
: '';
const actualText = item.actual === '-' ? '實際：待開' : '實際：' + item.actual;

return '<div class="history-item">' +
roundText +
'<div class="history-top">' +
'<div class="history-main">' +
'<div class="history-cards">' +
'<div><strong>閒牌面：</strong>' + (item.player || '-') + '</div>' +
'<div><strong>莊牌面：</strong>' + (item.banker || '-') + '</div>' +
'</div>' +
'<div class="history-smr">' +
'<div><strong>M：</strong>' + item.mPick + '（<span class="' + mCls + '">' + item.mStatus + '</span>）</div>' +
'<div><strong>真數：</strong>' + item.tPick + '（<span class="' + tCls + '">' + item.tStatus + '</span>）</div>' +
'<div><strong>R：</strong>' + item.rPick + '（<span class="' + rCls + '">' + item.rStatus + '</span>）</div>' +
'</div>' +
'</div>' +
'<div class="history-result ' + actualClass + '">' + actualText + '</div>' +
'</div>' +
'</div>';
}).join('');
}

function render() {
cells.forEach(function (cell) {
const idx = parseInt(cell.dataset.index, 10);
const val = values[idx];
cell.textContent = val;
if (val) cell.classList.remove('empty');
else cell.classList.add('empty');
});
highlight();
calc();
saveToStorage();
}

function inputCard(card) {
if (selectedIndex !== null) {
values[selectedIndex] = card;
selectedIndex = null;
} else if (currentStep < 6) {
values[order[currentStep]] = card;
currentStep += 1;
}
render();
renderHistory();
}

function skip() {
if (selectedIndex !== null) {
values[selectedIndex] = '';
selectedIndex = null;
render();
renderHistory();
return;
}
if (currentStep < 6) {
currentStep += 1;
render();
renderHistory();
}
}

function keepPendingOnScreen() {
if (!pendingPrediction) return;

linePredictEl.innerHTML =
colorPick('M', pendingPrediction.mPick) +
'　' + colorPick('T', pendingPrediction.tPick) +
'　' + colorPick('R', pendingPrediction.rPick);

linePredictMetaEl.textContent = formatPredictMeta(
pendingPrediction.mMeta,
pendingPrediction.tMeta,
pendingPrediction.rMeta
);
}

function saveRoundAndNext() {
const state = getRoundState();
const roundNo = getRoundNumber();

if (!roundNo) {
alert('請先輸入局數。');
roundInputEl.focus();
return;
}
if (state.playerCards.length < 2 || state.bankerCards.length < 2) {
alert('請至少先輸入閒家與莊家的前兩張牌。');
return;
}

if (pendingPrediction) {
historyData.unshift({
sourceRound: pendingPrediction.sourceRound,
targetRound: pendingPrediction.targetRound,
player: state.playerCards.join(' '),
banker: state.bankerCards.join(' '),
actual: state.actual,
mPick: pendingPrediction.mPick,
tPick: pendingPrediction.tPick,
rPick: pendingPrediction.rPick,
mStatus: getHistoryStatus(pendingPrediction.mPick, state.actual),
tStatus: getHistoryStatus(pendingPrediction.tPick, state.actual),
rStatus: getHistoryStatus(pendingPrediction.rPick, state.actual)
});

resolvedRounds.unshift({
actual: state.actual,
playerTotal: state.playerTotal,
bankerTotal: state.bankerTotal
});
if (resolvedRounds.length > 20) resolvedRounds = resolvedRounds.slice(0, 20);
}

pendingPrediction = {
sourceRound: roundNo,
targetRound: roundNo + 1,
mPick: String(state.m.pick),
tPick: String(state.t.pick),
rPick: String(state.r.pick),
mMeta: state.m.meta,
tMeta: state.t.meta,
rMeta: state.r.meta
};

roundInputEl.value = String(roundNo + 1);
values = ['', '', '', '', '', ''];
currentStep = 0;
selectedIndex = null;

playerScoreEl.textContent = '閒 0';
bankerScoreEl.textContent = '莊 0';
winnerTextEl.textContent = '和局';
winnerTextEl.className = 'winner-text winner-tie';
detailTextEl.textContent = '請依序輸入牌面';

render();
keepPendingOnScreen();
renderHistory();
saveToStorage();
}

function clearHistory() {
historyData = [];
pendingPrediction = null;
resolvedRounds = [];
renderHistory();
saveToStorage();
calc();
}

function clearBoard() {
values = ['', '', '', '', '', ''];
currentStep = 0;
selectedIndex = null;
render();
keepPendingOnScreen();
renderHistory();
}

cells.forEach(function (cell) {
cell.addEventListener('click', function () {
selectedIndex = parseInt(cell.dataset.index, 10);
highlight();
saveToStorage();
});
});

roundInputEl.addEventListener('input', function () {
calc();
keepPendingOnScreen();
renderHistory();
saveToStorage();
});

cardButtonsEl.addEventListener('click', function (e) {
const btn = e.target.closest('[data-card]');
if (!btn) return;
inputCard(btn.dataset.card);
});

skipBtn.addEventListener('click', skip);
nextBtn.addEventListener('click', saveRoundAndNext);
clearBoardBtn.addEventListener('click', clearBoard);
clearHistoryBtn.addEventListener('click', clearHistory);

loadFromStorage();
render();
renderHistory();
keepPendingOnScreen();
})();
</script>
</body>
</html>
